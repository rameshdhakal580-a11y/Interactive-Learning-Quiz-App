<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Learning Quiz</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
</head>

<body>

<!-- 🎵 Background Music -->
<audio id="bg-music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3" type="audio/mp3">
</audio>

<button id="install-btn">📲 Install</button>
<button id="music-toggle">🔊</button>

<!-- 🌈 HERO -->
<section id="hero">
  <div class="hero-content">
    <h1>🌟 Interactive Learning Quiz 🌟</h1>
    <p>Play • Learn • Grow 🚀</p>

    <div id="lang-switch">
      <button onclick="setLanguage('en')">English</button>
      <button onclick="setLanguage('np')">नेपाली</button>
    </div>

    <div class="category-grid">
      <button class="category-btn" data-category="science">🔬 Science</button>
      <button class="category-btn" data-category="maths">➗ Maths</button>
      <button class="category-btn" data-category="english">📖 English</button>
      <button class="category-btn" data-category="gk">🌎 GK</button>
    </div>
  </div>
</section>

<!-- 🧠 QUIZ -->
<section id="quiz-container" style="display:none;">
  <h2 id="question-text"></h2>

  <div id="progress-container">
    <div id="progress-bar"></div>
  </div>

  <div id="options"></div>

  <p>Score: <span id="score">0</span></p>

  <!-- 🎮 Controls -->
  <div class="game-controls">
    <button id="home-btn">🏠 Home</button>
    <button id="next-btn">➡️ Next</button>
  </div>
</section>

<!-- 🎉 COMPLETION -->
<section id="completion-screen" style="display:none;">
  <h2>🎉 Completed 🎉</h2>
  <p id="final-score"></p>
  <button onclick="location.reload()">Play Again</button>
</section>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script src="questions.js"></script>
<script src="script.js"></script>

</body>
</html>
